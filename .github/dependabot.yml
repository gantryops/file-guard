version: 2
updates:
  # GitHub Actions - keeps the SHA pins (and their version comments) current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      cargo:
        patterns: ["*"]
