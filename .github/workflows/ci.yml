name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fully gated path: matches what we verify locally via the flake dev shell.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: rustfmt
        run: nix develop --command cargo fmt --check
      - name: clippy (deny warnings)
        run: nix develop --command cargo clippy --all-targets -- -D warnings
      - name: test
        run: nix develop --command cargo test
      - name: build package
        run: nix build .#file-guard

  # macOS (Endpoint Security) is not built here: its enforcement path is
  # cfg-gated and pending the ES layout fix plus an Apple entitlement. Re-add a
  # build job when that work resumes.
